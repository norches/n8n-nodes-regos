# Manual run of n8n's official community-package scanner against the published
# package (the same check n8n runs during verification). Run it from the Actions
# tab after each release. Runs on Linux because the scanner's tar extraction is
# broken on Windows.

name: Scan published package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to scan (blank = latest)'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Scan
        run: |
          SPEC="n8n-nodes-regos${{ inputs.version && format('@{0}', inputs.version) || '' }}"
          echo "Scanning $SPEC"
          npx -y @n8n/scan-community-package "$SPEC"
