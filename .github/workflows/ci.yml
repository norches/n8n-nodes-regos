name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Assert zero runtime dependencies
        run: node -e "const p=require('./package.json'); if (p.dependencies && Object.keys(p.dependencies).length) { console.error('dependencies must stay empty (verified community node requirement)'); process.exit(1); }"

      # n8n Cloud eligibility is `strict mode && stock eslint config`. Shipping with either
      # one off makes the package ineligible for verification, which is how 0.1.3 failed the
      # Creator Portal's automated review. `n8n-node cloud-support` only prints status and
      # always exits 0, so assert both conditions explicitly.
      - name: Assert n8n Cloud verification eligibility
        run: |
          node -e "const p=require('./package.json'); if (p.n8n?.strict !== true) { console.error('package.json n8n.strict must be true — see docs/adr/0002-coding-guidelines.md'); process.exit(1); }"
          diff <(tr -d '[:space:]' < eslint.config.mjs) \
               <(tr -d '[:space:]' < node_modules/@n8n/node-cli/dist/template/templates/shared/default/eslint.config.mjs) \
            || { echo 'eslint.config.mjs must match the stock @n8n/node-cli template'; exit 1; }
          npx n8n-node cloud-support

      - name: Check generated output matches swagger
        run: npm run generate:check

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build
